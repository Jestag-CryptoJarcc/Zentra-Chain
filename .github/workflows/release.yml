name: Release

# Build portable Zentra Core Wallet + node binaries for Windows, Linux and macOS
# and attach them to a GitHub Release whenever a version tag (v*) is pushed.
#
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            ext: ".exe"
            archive: zip
          # Use 22.04 (glibc 2.35) so the binary runs on older Linux/VPS too.
          # Binaries are forward-compatible (old glibc runs on newer systems).
          - os: ubuntu-22.04
            name: linux-x64
            ext: ""
            archive: tar
          - os: macos-latest
            name: macos
            ext: ""
            archive: tar

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang libclang-dev pkg-config libssl-dev \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev \
            libgl1-mesa-dev libfontconfig1-dev libxcb1-dev

      - name: Set up libclang (Windows — needed for RocksDB/bindgen)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files\LLVM\bin") {
            echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          } else {
            choco install llvm -y
            echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          }

      - name: Build release binaries
        run: cargo build --release -p zentra-qt -p zentrad -p zentra-cli

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "zentra-${{ matrix.name }}"
          New-Item -ItemType Directory -Force "$dir/bin" | Out-Null
          Copy-Item target/release/zentra-qt.exe  "$dir/bin/"
          Copy-Item target/release/zentrad.exe    "$dir/bin/"
          Copy-Item target/release/zentra-cli.exe "$dir/bin/"
          Copy-Item README.md "$dir/"
          # Convenience launcher so users can double-click from the top folder
          "@echo off`r`nstart """" ""%~dp0bin\zentra-qt.exe""" | Out-File -Encoding ascii "$dir/Zentra Core Wallet.bat"
          Compress-Archive -Path "$dir/*" -DestinationPath "zentra-${{ matrix.name }}.zip" -Force

      - name: Stage artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          dir="zentra-${{ matrix.name }}"
          mkdir -p "$dir/bin"
          cp target/release/zentra-qt  "$dir/bin/"
          cp target/release/zentrad    "$dir/bin/"
          cp target/release/zentra-cli "$dir/bin/"
          cp README.md "$dir/"
          # Convenience launcher
          printf '#!/bin/sh\ncd "$(dirname "$0")/bin" && ./zentra-qt\n' > "$dir/run-zentra-wallet.sh"
          chmod +x "$dir/run-zentra-wallet.sh" "$dir/bin/"*
          tar -czf "zentra-${{ matrix.name }}.tar.gz" "$dir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zentra-${{ matrix.name }}
          path: |
            zentra-${{ matrix.name }}.zip
            zentra-${{ matrix.name }}.tar.gz
          if-no-files-found: ignore

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Zentra Core Wallet

            **Downloads:** pick your platform below. Each archive has a `bin/` folder
            with the wallet (`zentra-qt`), node (`zentrad`), and CLI (`zentra-cli`).

            > **Windows "not safe to run" warning?** That's SmartScreen flagging an
            > unsigned app — normal for new open-source software. Click
            > **More info → Run anyway**. Verify your download with `checksums.txt`.

            🪟 Windows: `zentra-windows-x64.zip` · 🐧 Linux: `zentra-linux-x64.tar.gz` · 🍎 macOS: `zentra-macos.tar.gz`
